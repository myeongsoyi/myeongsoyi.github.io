<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>고량주</title>
    <link rel="stylesheet" href="grj_week2.css">
    <script defer src="grj_week4_modal.js"></script>
    <script defer src="grj_week4_addItems.js"></script>
</head>

<body>
    <header>
        <h1>고량주</h1>
    </header>
    <main>
        <aside>
            <button id="addbtn">추가</button>
            <span>소주</span>
            <span>맥주</span>
            <span>샴페인</span>
            <span>와인</span>
            <span>럼</span>
        </aside>
        <section>
            <div>
                <img src="https://archivenew.vop.co.kr/images/8fc5d1792af708d7e3260be624f752cc/2019-11/marked/25115544_4.jpg"
                    alt="소주">
                저는 소주를 안 좋아해요!
            </div>
            <div>
                <img src="https://whisky.my/cdn-cgi/image/width=500,height=500,fit=crop,quality=80,format=auto,onerror=redirect,metadata=none/wp-content/uploads/APPLE-FOX-320ml-x-24-3.jpg"
                    alt="맥주">
                애플퐉스같은 맛있는 맥주가 좋아요.
            </div>
            <div>
                <img src="https://t1.daumcdn.net/thumb/R720x0/?fname=http://t1.daumcdn.net/brunch/service/user/6Thj/image/gytF-SkTsHMOga5wmaOTsxcIdTc.jpg"
                    alt="샴페인">
                샴페인 좋아요~ 샴페인 좋아요~
            </div>
            <div>
                <img src="https://img1.daumcdn.net/thumb/R800x0/?scode=mtistory2&fname=https%3A%2F%2Ft1.daumcdn.net%2Fcfile%2Ftistory%2F99422C465F5041391A"
                    alt="와인">
                와인의 매력을 아직 깨닫지 못했어요
            </div>
            <div>
                <img src="https://images.absolutdrinks.com/ingredient-images/Raw/Absolut/309eea74-f3eb-4f64-95c0-0991d1387805.jpg?imwidth=500"
                    alt="럼">
                먹어본 적이 없을 무!
            </div>
        </section>
    </main>
    <div id="modal">
        <form>
            <button id="closewx">X</button><br>
            <label for="name">이름</label><br>
            <input type="text" placeholder="스파클링와인"><br>
            <label for="image">이미지</label><br>
            <input type="text" placeholder="url"><br>
            <label for="content">내용</label><br>
            <input type=" text" placeholder="파티엔 빠질 수 없죠!"><br>
            <button id="save">저장</button>
        </form>
    </div>
</body>

</html>
